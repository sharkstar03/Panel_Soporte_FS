# Configuración de PRODUCCIÓN. Requiere un archivo .env con secretos fuertes
# (ver .env.example). El arranque falla intencionalmente si faltan secretos
# o si tienen valores inseguros.
services:
  db:
    image: supabase/postgres:17.6.1.133
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soporte}
      POSTGRES_USER: ${POSTGRES_USER:-soporte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD es obligatorio (define uno fuerte en .env)}
    ports:
      # Solo accesible desde la propia máquina, no expuesto a la red.
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-soporte}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD es obligatorio}@db:5432/${POSTGRES_DB:-soporte}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio (openssl rand -hex 32)}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY es obligatorio y debe ser distinto de JWT_SECRET (openssl rand -hex 32)}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-720}
      CORS_ORIGINS: "${CORS_ORIGINS:?CORS_ORIGINS es obligatorio - ej https://panel.midominio.com}"
      BOOTSTRAP_ADMIN: ${BOOTSTRAP_ADMIN:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD es obligatorio (contraseña fuerte)}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      # Almacenamiento de archivos: OPCIONAL. Si no defines S3_*, los adjuntos
      # se guardan en el volumen local 'apidata'. Para usar S3/MinIO, completa
      # estas variables en .env.
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-support-attachments}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      # Persiste adjuntos/evidencias/imágenes cuando se usa almacenamiento local.
      - apidata:/app/storage
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api

volumes:
  pgdata:
  apidata:
