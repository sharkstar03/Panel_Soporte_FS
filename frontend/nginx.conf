server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Límite de tamaño de subida (holgura sobre los 25MB que impone el backend
    # con MAX_UPLOAD_MB; evita el 413 prematuro del default de 1MB de nginx).
    client_max_body_size 30m;

    # Cabeceras de seguridad
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        # X-Real-IP lo fija el proxy (sobrescribe cualquier valor del cliente).
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
