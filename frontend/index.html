<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <title>Farmacia Saba — Panel Soporte</title>
    <script>
      // Aplica el tema guardado antes de pintar (evita parpadeo).
      (function () {
        try {
          if ((localStorage.getItem('theme') || 'dark') === 'light') {
            document.documentElement.classList.add('light')
          }
        } catch (e) {}
      })()
    </script>

    <!-- PWA / instalación -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#070b14" />
    <meta name="description" content="Panel Soporte de Farmacia Saba." />

    <!-- Iconos -->
    <link rel="icon" type="image/png" href="/logo-fs.png" />
    <link rel="apple-touch-icon" href="/logo-fs.png" />

    <!-- iOS: comportamiento de app instalada -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Panel Soporte" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
