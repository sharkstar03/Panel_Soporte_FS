services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soporte}
      POSTGRES_USER: ${POSTGRES_USER:-soporte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soporte}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    # ENTORNO DE PREVIEW EFÍMERO ÚNICAMENTE. APP_ENV=development desactiva las
    # validaciones estrictas de secretos. NO usar esta configuración en producción.
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-soporte}:${POSTGRES_PASSWORD:-soporte}@db:5432/${POSTGRES_DB:-soporte}
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me}
      MASTER_KEY: ${MASTER_KEY:-dev-only-insecure-master-key-change-me}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-720}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      BOOTSTRAP_ADMIN: ${BOOTSTRAP_ADMIN:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
    volumes:
      - apidata:/app/storage
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  apidata:
